<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>記事 | The Dance Times</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg:           #f7f6f3;
      --bg-card:      #ffffff;
      --border:       #e0ddd8;
      --text:         #1a1a1a;
      --text-sub:     #777068;
      --accent:       #6ec9c1;
      --accent-dark:  #3a9e96;
      --accent-soft:  rgba(110,201,193,0.13);
      --accent-line:  rgba(110,201,193,0.5);
      --gold:         #c9a96e;
      --radius:       2px;
      --shadow:       0 2px 24px rgba(0,0,0,0.07);
      --shadow-lg:    0 8px 48px rgba(0,0,0,0.10);
      --font-display: 'Cormorant Garamond', 'Noto Serif JP', serif;
      --font-body:    'Noto Serif JP', serif;
      --font-mono:    'DM Mono', monospace;
      --max-w:        1080px;
      --content-w:    720px;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ===== LAYOUT ===== */
    .wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ===== HEADER ===== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,246,243,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 0; gap: 20px;
    }
    .logo {
      display: flex; align-items: baseline; gap: 10px;
      flex-shrink: 0;
    }
    .logo-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }
    .logo-sub {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--text-sub);
      text-transform: uppercase;
    }
    nav {
      display: flex; align-items: center; gap: 24px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-link {
      color: var(--text-sub);
      position: relative;
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute; left: 0; bottom: -1px;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link:hover::after { width: 100%; }

    /* hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column; gap: 5px;
      width: 24px; padding: 4px 0;
    }
    .nav-toggle span {
      display: block; height: 1px;
      background: var(--text);
      transition: all 0.3s;
    }

    /* ===== FOOTER ===== */
    footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
    }
    .footer-inner {
      padding: 20px 0;
      display: flex; flex-wrap: wrap;
      justify-content: space-between; align-items: center;
      gap: 12px;
    }
    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-sub);
      letter-spacing: 0.08em;
    }
    .footer-links {
      display: flex; gap: 20px; flex-wrap: wrap;
    }
    .footer-links a {
      font-family: var(--font-mono);
      font-size: 0.63rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--accent-dark); }

    /* ===== LOADING / ERROR ===== */
    .api-loading {
      font-family: var(--font-mono); font-size: 0.75rem;
      letter-spacing: 0.12em; color: var(--text-sub);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 80px 0;
    }
    .api-spinner {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 2px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .api-error {
      font-size: 0.9rem; color: var(--text-sub);
      border: 1px dashed var(--border); border-radius: var(--radius);
      padding: 48px; text-align: center;
      max-width: var(--content-w); margin: 60px auto;
    }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      padding: 20px 0 0;
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.63rem;
      letter-spacing: 0.08em;
      color: var(--text-sub);
    }
    .breadcrumb a { color: var(--accent-dark); transition: opacity 0.15s; }
    .breadcrumb a:hover { opacity: 0.75; }
    .breadcrumb-sep { color: var(--border); }

    /* ===== ARTICLE ===== */
    .article-wrap {
      max-width: var(--content-w);
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    /* eyebrow row */
    .art-eyebrow {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
      margin-bottom: 18px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--text-sub);
    }
    .art-cat {
      background: var(--accent-soft);
      color: var(--accent-dark);
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.62rem;
    }
    .art-eyebrow-sep { color: var(--border); }

    /* title */
    .art-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 24px;
    }

    /* meta grid */
    .art-meta {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .art-meta-cell {
      background: var(--bg-card);
      padding: 12px 16px;
    }
    .art-meta-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 4px;
    }
    .art-meta-value {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.4;
    }

    /* hero image */
    .art-hero-img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 36px;
      display: block;
    }

    /* divider */
    .art-divider {
      height: 1px;
      background: linear-gradient(to right, var(--accent-line), transparent);
      margin-bottom: 32px;
    }

    /* body */
    .art-body {
      font-size: 0.95rem;
      line-height: 2;
      color: var(--text);
    }
    .art-body p { margin-bottom: 1.4em; }
    .art-body h2, .art-body h3 {
      font-family: var(--font-display);
      font-weight: 400;
      margin: 2em 0 0.6em;
    }
    .art-body h2 { font-size: 1.4rem; }
    .art-body h3 { font-size: 1.15rem; }
    .art-body img {
      max-width: 100%;
      border-radius: var(--radius);
      margin: 1.2em 0;
    }
    .art-body a { color: var(--accent-dark); text-decoration: underline; text-underline-offset: 3px; }
    .art-body blockquote {
      border-left: 3px solid var(--accent-line);
      padding-left: 1.2em;
      color: var(--text-sub);
      font-style: italic;
      margin: 1.4em 0;
    }

    /* back link */
    .art-back {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 48px;
      padding: 9px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-sub);
      transition: border-color 0.2s, color 0.2s;
    }
    .art-back:hover { border-color: var(--accent); color: var(--accent-dark); }
    .art-back::before { content: '←'; }

    /* page animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .article-wrap { animation: fadeUp 0.6s ease both; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .wrap { padding: 0 16px; }
      .header-inner { flex-wrap: nowrap; }
      nav {
        display: none; flex-direction: column; gap: 0;
        position: absolute; top: 100%; left: 0; right: 0;
        background: var(--bg); border-bottom: 1px solid var(--border);
        padding: 8px 0;
      }
      nav.open { display: flex; }
      .nav-toggle { display: flex; }
      nav .nav-link { padding: 12px 24px; width: 100%; }
      nav .nav-link::after { display: none; }
      .art-meta { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 400px) {
      .art-title { font-size: 1.5rem; }
      .art-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div class="page">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <span class="logo-title">The Dance Times</span>
          <span class="logo-sub">Dance Review</span>
        </a>
        <nav id="main-nav">
          <a href="index.html#latest"   class="nav-link">最新の記事</a>
          <a href="index.html#categories" class="nav-link">カテゴリ</a>
          <a href="index.html#archive"  class="nav-link">アーカイブ</a>
          <a href="index.html#about"    class="nav-link">このサイトについて</a>
        </nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">

      <!-- breadcrumb -->
      <nav class="breadcrumb" aria-label="パンくずリスト" id="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">/</span>
        <span id="breadcrumb-section">記事</span>
      </nav>

      <!-- article content (filled by JS) -->
      <div id="article-root">
        <div class="api-loading">
          <div class="api-spinner"></div>
          読み込み中
        </div>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="wrap">
      <div class="footer-inner">
        <div class="footer-copy">© <span id="year"></span> The Dance Times</div>
        <nav class="footer-links">
          <a href="index.html#about">このサイトについて</a>
          <a href="index.html#categories">カテゴリ</a>
          <a href="index.html#archive">アーカイブ</a>
        </nav>
      </div>
    </div>
  </footer>

</div><!-- /page -->

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // hamburger
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('main-nav').classList.toggle('open');
  });

  const API_BASE = 'https://dancetimes-worker.dancetimesofficial.workers.dev';

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderMetaCell(label, value) {
    if (!value) return '';
    return `
      <div class="art-meta-cell">
        <div class="art-meta-label">${esc(label)}</div>
        <div class="art-meta-value">${esc(value)}</div>
      </div>`;
  }

  function renderArticle(a, source) {
    // ── フィールドの正規化 ──
    const title    = a.title        || a['タイトル']      || '（無題）';
    const category = a.category     || a['カテゴリ']      || '';
    const author   = a.author       || a['執筆者名']      || '';
    const pubDate  = a.originalDate || a.publishDate || a['公開日'] || a.original_date || '';
    const perfDate = a.performanceDate || a['公演日']     || a.performance_date || '';
    const perfTime = a.performanceTime || a['公演時間']   || a.performance_time || '';
    const venue    = a.venue        || a['会場']          || '';
    const body     = a.body         || a['本文']          || '';
    const photoUrl = a.photoUrl     || a.photo_url || a['写真'] || '';

    // ── 日付整形 ──
    const pubStr  = formatDate(pubDate);
    const perfStr = perfDate ? formatDate(perfDate) : '';

    // ── breadcrumb テキスト ──
    document.getElementById('breadcrumb-section').textContent =
      source === 'archive' ? 'アーカイブ' : '最新の記事';

    // ── ページタイトル ──
    document.title = `${title} | The Dance Times`;

    // ── 本文: archive は HTML, articles は テキスト ──
    const bodyHtml = source === 'archive'
      ? body
      : body.split('\n').filter(l => l.trim()).map(l => `<p>${esc(l)}</p>`).join('');

    return `
      <div class="article-wrap">
        <div class="art-eyebrow">
          ${category ? `<span class="art-cat">${esc(category)}</span><span class="art-eyebrow-sep">·</span>` : ''}
          ${pubStr   ? `<span>${pubStr}</span>`                                                                : ''}
          ${author   ? `<span class="art-eyebrow-sep">·</span><span>${esc(author)}</span>`                    : ''}
        </div>

        <h1 class="art-title">${esc(title)}</h1>

        <div class="art-meta">
          ${renderMetaCell('執筆者', author)}
          ${renderMetaCell('公開日', pubStr)}
          ${renderMetaCell('公演日', perfStr ? perfStr + (perfTime ? '　' + perfTime : '') : '')}
          ${renderMetaCell('会場',   venue)}
        </div>

        ${photoUrl ? `<img class="art-hero-img" src="${esc(photoUrl)}" alt="${esc(title)}" loading="lazy" />` : ''}

        <div class="art-divider"></div>

        <div class="art-body">${bodyHtml}</div>

        <a href="index.html${source === 'archive' ? '#archive' : '#latest'}" class="art-back">
          ${source === 'archive' ? 'アーカイブに戻る' : '記事一覧に戻る'}
        </a>
      </div>`;
  }

  async function loadArticle() {
    const params = new URLSearchParams(location.search);
    const id     = params.get('id');
    const source = params.get('source') || 'articles';
    const root   = document.getElementById('article-root');

    if (!id) {
      root.innerHTML = `<div class="api-error">URLに記事IDが含まれていません。<br><a href="index.html" style="color:var(--accent-dark)">トップページへ</a></div>`;
      return;
    }

    try {
      const endpoint = source === 'archive' ? '/archive' : '/articles';
      const res  = await fetch(API_BASE + endpoint);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const list = await res.json();

      let article;
      if (source === 'archive') {
        article = list.find(a => String(a.id) === String(id));
      } else {
        // articles: id として timestamp を使用
        article = list.find(a => String(a.timestamp) === String(id));
      }

      if (!article) {
        root.innerHTML = `<div class="api-error">記事が見つかりませんでした（ID: ${esc(id)}）。<br><a href="index.html" style="color:var(--accent-dark)">トップページへ</a></div>`;
        return;
      }

      root.innerHTML = renderArticle(article, source);

    } catch (err) {
      console.error(err);
      root.innerHTML = `<div class="api-error">記事の読み込みに失敗しました。<br><small style="color:var(--text-sub)">${esc(err.message)}</small><br><br><a href="index.html" style="color:var(--accent-dark)">トップページへ</a></div>`;
    }
  }

  loadArticle();
</script>
</body>
</html>
