<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>記事一覧 | The Dance Times</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Dance Times の記事一覧。バレエ・コンテンポラリーなど舞踊のレビュー・批評・レポートを掲載。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg:           #f7f6f3;
      --bg-card:      #ffffff;
      --border:       #e0ddd8;
      --text:         #1a1a1a;
      --text-sub:     #777068;
      --accent:       #6ec9c1;
      --accent-dark:  #3a9e96;
      --accent-soft:  rgba(110,201,193,0.13);
      --accent-line:  rgba(110,201,193,0.5);
      --gold:         #c9a96e;
      --radius:       2px;
      --shadow:       0 2px 24px rgba(0,0,0,0.07);
      --shadow-lg:    0 8px 48px rgba(0,0,0,0.10);
      --font-display: 'Cormorant Garamond', 'Noto Serif JP', serif;
      --font-body:    'Noto Serif JP', serif;
      --font-mono:    'DM Mono', monospace;
      --max-w:        1080px;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 64px; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ===== LAYOUT ===== */
    .wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ===== HEADER ===== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,246,243,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 0; gap: 20px;
    }
    .logo {
      display: flex; align-items: baseline; gap: 10px;
      flex-shrink: 0;
    }
    .logo-title {
      font-family: var(--font-display);
      font-size: 1.35rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text);
    }
    .logo-sub {
      font-family: var(--font-mono);
      font-size: 0.62rem; letter-spacing: 0.12em;
      color: var(--text-sub); text-transform: uppercase;
    }
    nav {
      display: flex; align-items: center; gap: 24px;
      font-family: var(--font-mono);
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .nav-link {
      color: var(--text-sub); position: relative;
      padding-bottom: 2px; transition: color 0.2s;
    }
    .nav-link::after {
      content: ''; position: absolute; left: 0; bottom: -1px;
      width: 0; height: 1px; background: var(--accent);
      transition: width 0.25s ease;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link:hover::after { width: 100%; }
    .nav-toggle {
      display: none; flex-direction: column; gap: 5px;
      width: 24px; padding: 4px 0;
    }
    .nav-toggle span { display: block; height: 1px; background: var(--text); transition: all 0.3s; }

    /* ===== PAGE HEADER ===== */
    .page-head {
      padding: 40px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .page-head-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.63rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--accent-dark);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .page-head-eyebrow::before {
      content: ''; display: block; width: 24px; height: 1px; background: var(--accent);
    }
    .page-head-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 300; letter-spacing: 0.04em;
    }

    /* ===== TOOLBAR ===== */
    .toolbar-wrap {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 12px;
      align-items: center; justify-content: space-between;
    }
    .search-box {
      position: relative; flex: 1 1 260px; max-width: 380px;
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 0.8rem;
      color: var(--text-sub); pointer-events: none;
    }
    .search-box input {
      width: 100%; padding: 8px 14px 8px 34px;
      border: 1px solid var(--border); border-radius: 999px;
      background: var(--bg-card); font-family: var(--font-body);
      font-size: 0.82rem; color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-sub); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 999px;
      background: var(--bg-card); font-family: var(--font-mono);
      font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-sub); transition: all 0.15s;
    }
    .chip:hover, .chip--active {
      border-color: var(--accent); background: var(--accent-soft);
      color: var(--accent-dark); font-weight: 600;
    }

    /* ===== ARTICLE CARDS ===== */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .art-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex; flex-direction: column; cursor: pointer;
    }
    .art-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .art-card-img img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .art-card-img img.art-card-default-img { object-fit: contain; padding: 24px; background: #e4f8fb; }
    .art-card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .art-card-meta {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      font-family: var(--font-mono); font-size: 0.62rem;
      color: var(--text-sub); letter-spacing: 0.06em;
    }
    .art-card-cat {
      background: var(--accent-soft); color: var(--accent-dark);
      padding: 2px 8px; border-radius: 999px;
    }
    .art-card-title {
      font-family: var(--font-display); font-size: 1rem; font-weight: 400;
      line-height: 1.45; color: var(--text);
    }
    .art-card-venue { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-sub); letter-spacing: 0.04em; }
    .art-card-author { font-size: 0.78rem; color: var(--text-sub); margin-top: auto; }

    /* ===== STATUS ===== */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.06em; color: var(--text-sub);
      margin-bottom: 20px;
    }
    .api-state { grid-column: 1 / -1; padding: 40px; text-align: center; }
    .api-loading {
      font-family: var(--font-mono); font-size: 0.75rem;
      letter-spacing: 0.12em; color: var(--text-sub);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .api-spinner {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 2px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .api-error {
      font-size: 0.85rem; color: var(--text-sub);
      border: 1px dashed var(--border); border-radius: var(--radius); padding: 32px;
    }
    .api-empty {
      font-family: var(--font-mono); font-size: 0.75rem;
      letter-spacing: 0.08em; color: var(--text-sub); padding: 32px;
    }

    /* ===== PAGINATION ===== */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; flex-wrap: wrap;
      padding: 40px 0 20px;
    }
    .page-btn {
      min-width: 36px; height: 36px; padding: 0 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-card);
      font-family: var(--font-mono); font-size: 0.68rem;
      letter-spacing: 0.06em; color: var(--text-sub);
      transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
    .page-btn--active {
      border-color: var(--accent); background: var(--accent-soft);
      color: var(--accent-dark); font-weight: 600; pointer-events: none;
    }
    .page-btn--disabled { opacity: 0.35; pointer-events: none; }
    .page-ellipsis {
      font-family: var(--font-mono); font-size: 0.68rem;
      color: var(--text-sub); padding: 0 4px;
    }

    /* ===== FOOTER ===== */
    footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
    }
    .footer-inner {
      padding: 20px 0;
      display: flex; flex-wrap: wrap;
      justify-content: space-between; align-items: center; gap: 12px;
    }
    .footer-copy {
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--text-sub); letter-spacing: 0.08em;
    }
    .footer-links { display: flex; gap: 20px; flex-wrap: wrap; }
    .footer-links a {
      font-family: var(--font-mono); font-size: 0.63rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-sub); transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--accent-dark); }

    /* ===== ANIMATION ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-head   { animation: fadeUp 0.5s ease both; }
    .toolbar-wrap{ animation: fadeUp 0.5s 0.1s ease both; }
    #grid-wrap   { animation: fadeUp 0.5s 0.2s ease both; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .wrap { padding: 0 16px; }
      .header-inner { flex-wrap: nowrap; }
      nav {
        display: none; flex-direction: column; gap: 0;
        position: fixed; top: 60px; left: 0; right: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        z-index: 99;
        padding: 8px 0;
      }
      nav.open { display: flex; }
      .nav-toggle { display: flex; }
      nav .nav-link { padding: 12px 24px; width: 100%; }
      nav .nav-link::after { display: none; }
      .nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
      .nav-toggle.open span:nth-child(2) { opacity: 0; }
      .nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
      .nav-backdrop { display: none; position: fixed; inset: 0; z-index: 98; }
      .nav-backdrop.open { display: block; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      main { padding-top: 8px; }
      .page-head { padding-top: 24px; }
    }
  </style>

<body>
<div class="page">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <span class="logo-title">The Dance Times</span>
          <span class="logo-sub">Dance Review</span>
        </a>
        <nav id="main-nav">
          <a href="index.html#latest"      class="nav-link">最新の記事</a>
          <a href="index.html#categories"  class="nav-link">カテゴリ</a>
          <a href="index.html#archive"     class="nav-link">アーカイブ</a>
          <a href="index.html#about"       class="nav-link">このサイトについて</a>
        </nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>
  <div class="nav-backdrop" id="nav-backdrop"></div>

  <main>

    <!-- ===== PAGE HEADER ===== -->
    <div class="page-head">
      <div class="wrap">
        <div class="page-head-eyebrow">Articles</div>
        <h1 class="page-head-title">記事一覧</h1>
      </div>
    </div>

    <!-- ===== TOOLBAR ===== -->
    <div class="toolbar-wrap">
      <div class="wrap">
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="search"
              placeholder="作品名・ダンサー名・劇場名などで検索"
              aria-label="記事検索" id="search-input" />
          </div>
          <div class="chips" role="group" aria-label="カテゴリフィルタ">
            <button class="chip chip--active" data-cat="all">すべて</button>
            <button class="chip" data-cat="best">月間ベスト</button>
            <button class="chip" data-cat="review">舞台評</button>
            <button class="chip" data-cat="report">レポート</button>
            <button class="chip" data-cat="en">English</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== GRID ===== -->
    <div id="grid-wrap">
      <div class="wrap">
        <div class="status-bar" id="status-bar"></div>
        <div id="articles-grid" class="articles-grid">
          <div class="api-state">
            <div class="api-loading">
              <div class="api-spinner"></div>
              記事を読み込み中
            </div>
          </div>
        </div>
        <div id="pagination" class="pagination"></div>
      </div>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="wrap">
      <div class="footer-inner">
        <div class="footer-copy">© <span id="year"></span> The Dance Times</div>
        <nav class="footer-links">
          <a href="index.html#about">このサイトについて</a>
          <a href="index.html#categories">カテゴリ</a>
          <a href="index.html#archive">アーカイブ</a>
        </nav>
      </div>
    </div>
  </footer>

</div><!-- /page -->

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  const toggle   = document.getElementById('nav-toggle');
  const mainNav  = document.getElementById('main-nav');
  const backdrop = document.getElementById('nav-backdrop');
  function closeNav() {
    mainNav.classList.remove('open');
    toggle.classList.remove('open');
    backdrop.classList.remove('open');
  }
  toggle.addEventListener('click', () => {
    const isOpen = mainNav.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    backdrop.classList.toggle('open', isOpen);
  });
  backdrop.addEventListener('click', closeNav);
  mainNav.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', closeNav));

  const API_BASE    = 'https://dancetimes-worker.dancetimesofficial.workers.dev';
  const DEFAULT_IMG = 'assets/logo.png';
  const PER_PAGE    = 20;

  let allArticles   = [];
  let currentCat    = 'all';
  let currentSearch = '';
  let currentPage   = 1;

  // ── ユーティリティ ──────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function getCatKey(a) {
    const lang = (a.language || '').toLowerCase();
    if (lang === 'english' || lang === 'en') return 'en';
    const cat = a.category || '';
    if (cat.includes('月間ベスト') || cat.includes('ベストダンサー')) return 'best';
    if (cat.includes('舞台評') || cat.includes('批評') || cat.includes('レビュー')) return 'review';
    if (cat.includes('レポート') || cat.includes('インタビュー') || cat.includes('取材')) return 'report';
    return 'other';
  }

  // ── フィルタ ──────────────────────────────────────────────────────────────
  function filtered() {
    const q = currentSearch.toLowerCase();
    return allArticles.filter(a => {
      if (currentCat !== 'all' && getCatKey(a) !== currentCat) return false;
      if (q) {
        const text = [a.title, a.category, a.author, a.venue].join(' ').toLowerCase();
        if (!text.includes(q)) return false;
      }
      return true;
    });
  }

  // ── カード描画 ─────────────────────────────────────────────────────────────
  function renderCard(a) {
    const catKey   = getCatKey(a);
    const dateStr  = formatDate(a.publishDate || a.timestamp);
    const perfDate = a.performanceDate ? formatDate(a.performanceDate) : '';
    const venueStr = a.venue ? (perfDate ? `${perfDate} ── ${esc(a.venue)}` : esc(a.venue)) : '';
    const href     = `article.html?id=${encodeURIComponent(a.timestamp)}&source=articles`;
    const imgSrc   = a.photo || DEFAULT_IMG;
    const imgClass = a.photo ? '' : 'art-card-default-img';
    return `
      <a href="${href}" class="art-card" data-cat="${catKey}">
        <div class="art-card-img"><img src="${esc(imgSrc)}" alt="${esc(a.title)}" loading="lazy"${imgClass ? ` class="${imgClass}"` : ''}></div>
        <div class="art-card-body">
          <div class="art-card-meta">
            ${a.category ? `<span class="art-card-cat">${esc(a.category)}</span>` : ''}
            <span>${esc(dateStr)}</span>
          </div>
          <h2 class="art-card-title">${esc(a.title)}</h2>
          ${venueStr ? `<div class="art-card-venue">${venueStr}</div>` : ''}
          ${a.author ? `<div class="art-card-author">${esc(a.author)}</div>` : ''}
        </div>
      </a>`;
  }

  // ── ページネーション描画 ────────────────────────────────────────────────────
  function renderPagination(total) {
    const totalPages = Math.ceil(total / PER_PAGE);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    const p = currentPage;
    let html = '';

    // 前へ
    html += `<button class="page-btn${p === 1 ? ' page-btn--disabled' : ''}" data-page="${p - 1}">←</button>`;

    // ページ番号（前後2ページ + 端 + 省略）
    const pages = new Set([1, totalPages, p - 1, p, p + 1].filter(n => n >= 1 && n <= totalPages));
    let prev = 0;
    for (const n of [...pages].sort((a, b) => a - b)) {
      if (prev && n - prev > 1) html += `<span class="page-ellipsis">…</span>`;
      html += `<button class="page-btn${n === p ? ' page-btn--active' : ''}" data-page="${n}">${n}</button>`;
      prev = n;
    }

    // 次へ
    html += `<button class="page-btn${p === totalPages ? ' page-btn--disabled' : ''}" data-page="${p + 1}">→</button>`;

    pag.innerHTML = html;
    pag.querySelectorAll('.page-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        renderAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // ── 全体描画 ────────────────────────────────────────────────────────────────
  function renderAll() {
    const grid   = document.getElementById('articles-grid');
    const status = document.getElementById('status-bar');
    const list   = filtered();
    const total  = list.length;

    // ステータス
    const start = (currentPage - 1) * PER_PAGE + 1;
    const end   = Math.min(currentPage * PER_PAGE, total);
    status.textContent = total > 0 ? `${total} 件中 ${start}–${end} 件を表示` : '';

    if (total === 0) {
      grid.innerHTML = '<div class="api-state"><div class="api-empty">該当する記事がありません。</div></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    const page = list.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);
    grid.innerHTML = page.map(renderCard).join('');
    renderPagination(total);
  }

  // ── イベント ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip--active'));
      chip.classList.add('chip--active');
      currentCat  = chip.dataset.cat;
      currentPage = 1;
      renderAll();
    });
  });

  document.getElementById('search-input').addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    currentPage   = 1;
    renderAll();
  });
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') e.preventDefault();
  });

  // ── データ取得 ─────────────────────────────────────────────────────────────
  async function loadArticles() {
    try {
      const res = await fetch(API_BASE + '/articles');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allArticles = (await res.json()).sort((a, b) => {
        const da = a.publishDate || a.timestamp || '';
        const db = b.publishDate || b.timestamp || '';
        return db.localeCompare(da);
      });
      renderAll();
    } catch (err) {
      document.getElementById('articles-grid').innerHTML =
        `<div class="api-state"><div class="api-error">記事の読み込みに失敗しました。<br><small>${esc(err.message)}</small></div></div>`;
    }
  }

  loadArticles();
</script>
</body>
</html>
